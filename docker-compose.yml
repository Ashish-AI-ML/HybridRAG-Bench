version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  hybridrag-api:
    build: .
    container_name: hybridrag-api
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - QDRANT_MODE=cloud
      - QDRANT_URL=http://qdrant:6333
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - APP_ENV=production
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  hybridrag-dashboard:
    build: .
    container_name: hybridrag-dashboard
    command: ["streamlit", "run", "dashboard/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - QDRANT_MODE=cloud
      - QDRANT_URL=http://qdrant:6333
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - APP_ENV=production
    volumes:
      - ./data:/app/data
    depends_on:
      qdrant:
        condition: service_started
      hybridrag-api:
        condition: service_healthy
    restart: unless-stopped
